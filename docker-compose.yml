version: "3.9"

services:
  # PostgreSQL Database (SRS Section 2.4)
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fradupix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fradupix_secure_2024}
      POSTGRES_DB: ${POSTGRES_DB:-fradupix}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fradupix"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis (Queue Broker + Cache + Fingerprint Index) (SRS Section 2.4)
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO (S3-compatible file storage) (SRS Section 2.4)
  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  # FastAPI Backend (SRS Section 7.1 - invoicefirewall-api)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://fradupix:fradupix_secure_2024@db:5432/fradupix
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
      - MINIO_BUCKET=invoices
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-dev-secret-key}
      - APP_ENV=development
      - RISK_WEIGHT_FORGERY=0.30
      - RISK_WEIGHT_DUPLICATE=0.25
      - RISK_WEIGHT_ANOMALY=0.25
      - RISK_WEIGHT_RULES=0.20
      - LOG_LEVEL=INFO
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: '1'

  # Celery Worker (SRS Section 7.1 - invoicefirewall-worker)
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=4
    environment:
      - DATABASE_URL=postgresql://fradupix:fradupix_secure_2024@db:5432/fradupix
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin123
      - MINIO_BUCKET=invoices
      - RISK_WEIGHT_FORGERY=0.30
      - RISK_WEIGHT_DUPLICATE=0.25
      - RISK_WEIGHT_ANOMALY=0.25
      - RISK_WEIGHT_RULES=0.20
    volumes:
      - ./backend/app:/app/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2'

  # Celery Beat (Scheduled Tasks - weekly retraining, hourly cleanup)
  celery_beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: celery -A app.tasks.celery_app beat --loglevel=info
    environment:
      - DATABASE_URL=postgresql://fradupix:fradupix_secure_2024@db:5432/fradupix
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # React Frontend (SRS Section 7.1 - invoicefirewall-ui)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

volumes:
  postgres_data:
  redis_data:
  minio_data:
